<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 翻轉單字卡 - 究極字庫版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --card-bg: #ffffff; --text: #333333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); max-width: 600px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tabs button { flex: 1; padding: 12px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; color: #666; transition: 0.3s; }
        .tabs button.active { background: var(--primary); color: white; }
        .section-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group input { flex: 1; padding: 12px; border: 2px solid #e1e4e8; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        .input-group input:focus { border-color: var(--primary); }
        .btn-add { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-add:disabled { background: #ccc; cursor: not-allowed; }
        .word-list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .btn-action-group { display: flex; gap: 5px; flex-shrink: 0; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .flashcard-scene { perspective: 1000px; width: 100%; height: 400px; margin: 20px 0; }
        .flashcard { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .flashcard.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; box-sizing: border-box; display: flex; flex-direction: column; border: 2px solid #f0f0f0; overflow-y: auto; }
        .card-back { transform: rotateY(180deg); background: #fdfdfd; border-color: var(--primary); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 2px dashed #eee; padding-bottom: 15px; flex-shrink: 0; }
        .word-title { font-size: 2.2em; font-weight: 800; color: var(--primary); margin: 0; line-height: 1.2; word-break: break-word;}
        .phonetic { color: #888; font-size: 1.1rem; margin-top: 5px; display: block; }
        .ex-container { flex: 1; }
        .ex-row { display: flex; align-items: flex-start; background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 10px; gap: 10px; }
        .ex-text { flex: 1; font-size: 1.05rem; color: #444; line-height: 1.4; }
        .btn-audio { background: #f0f2f5; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .btn-audio.main { width: 50px; height: 50px; font-size: 24px; background: #e1effe; color: var(--primary); }
        .quiz-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .quiz-controls button { padding: 12px 25px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .flip-hint { text-align: center; color: #aaa; font-size: 0.9em; margin-top: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.9em; font-weight: bold; color: #555; }
        .form-group input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; outline: none; }
        .edit-ex-group { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e1e4e8; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; position: sticky; bottom: -10px; background: white; padding-top: 10px; border-top: 1px solid #eee; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #95a5a6; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-add-ex { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 0.85em; cursor: pointer; float: right; }
        #error-box { display: none; background: #ffeaa7; padding: 20px; border: 2px solid #d63031; color: #d63031; border-radius: 10px; margin-bottom: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div id="error-box"></div>
    <div id="app" style="display: none;">
        <nav class="tabs">
            <button @click="currentTab = 'add'" :class="{ active: currentTab === 'add' }">➕ 擴充單字</button>
            <button @click="currentTab = 'bank'" :class="{ active: currentTab === 'bank' }">📚 單字庫 ({{ wordBank.length }})</button>
            <button @click="startQuiz" :class="{ active: currentTab === 'quiz' }">🎯 翻卡測驗</button>
        </nav>

        <div v-show="currentTab === 'add'" class="section-box">
            <h2>輸入想學的英文單字</h2>
            <div class="input-group">
                <input type="text" v-model="searchQuery" @keyup.enter="searchAndAddWord" placeholder="例如: commute...">
                <button @click="searchAndAddWord" :disabled="loading || !searchQuery.trim()" class="btn-add">
                    <span v-if="loading" class="loader"></span>
                    <span v-else>一鍵獲取</span>
                </button>
            </div>
        </div>

        <div v-show="currentTab === 'bank'" class="section-box">
            <h2>我的單字庫</h2>
            <div v-for="(w, index) in wordBank" :key="index" class="word-list-item">
                <div style="font-size: 1.1em; flex: 1;">
                    <strong>{{ w.word }}</strong> 
                    <button @click="speak(w.word)" style="background:none; border:none; cursor:pointer; font-size:1.2em; margin-left:5px;">🔊</button>
                    <div style="color: #d9534f; font-size: 0.9em; margin-top: 4px;">{{ w.chinese }} (共 {{ w.examples ? w.examples.length : 0 }} 句例句)</div>
                </div>
                <div class="btn-action-group">
                    <button @click="openEditModal(index)" class="btn-edit">✏️</button>
                    <button @click="removeFromBank(index)" class="btn-del">🗑️</button>
                </div>
            </div>
        </div>

        <div v-show="currentTab === 'quiz'">
            <div v-if="quizWords.length > 0">
                <div style="text-align: center; font-weight: bold; color: #666;">進度: {{ currentQuizIndex + 1 }} / {{ quizWords.length }}</div>
                <div class="flashcard-scene">
                    <div class="flashcard" :class="{ 'is-flipped': isFlipped }" @click="flipCard">
                        <div class="card-face card-front">
                            <div class="card-header">
                                <div>
                                    <h3 class="word-title">{{ currentCard.word }}</h3>
                                </div>
                                <button class="btn-audio main" @click.stop="speak(currentCard.word)">🔊</button>
                            </div>
                            <div class="ex-container">
                                <div v-for="(ex, i) in currentCard.examples" :key="i" class="ex-row">
                                    <div class="ex-text">{{ ex }}</div>
                                    <button class="btn-audio" @click.stop="speak(ex)">🔈</button>
                                </div>
                            </div>
                            <div class="flip-hint">👆 點擊空白處翻面查看解答</div>
                        </div>
                        <div class="card-face card-back">
                            <div class="card-header" style="border-bottom-color: #d9534f;">
                                <div><h3 class="word-title" style="color: #d9534f;">{{ currentCard.chinese }}</h3></div>
                            </div>
                            <div class="ex-container">
                                <div v-for="(zhEx, i) in currentCard.chinese_ex" :key="i" class="ex-row" style="background: #fff5f5;">
                                    <div class="ex-text" style="color:#c0392b;">{{ zhEx }}</div>
                                </div>
                            </div>
                            <div class="flip-hint">👆 點擊空白處翻回正面</div>
                        </div>
                    </div>
                </div>
                <div class="quiz-controls">
                    <button @click="prevCard" :disabled="currentQuizIndex === 0">⬅️ 上一字</button>
                    <button @click="nextCard" v-if="currentQuizIndex < quizWords.length - 1">下一字 ➡️</button>
                    <button @click="finishQuiz" v-else style="background: #28a745;">🎉 結束測驗</button>
                </div>
            </div>
        </div>

        <div v-if="showEditModal" class="modal-overlay" @click.self="closeEditModal">
            <div class="modal-content">
                <h3>編輯單字卡</h3>
                <div class="form-group"><label>英文單字</label><input v-model="editData.word" type="text"></div>
                <div class="form-group"><label>中文釋義</label><input v-model="editData.chinese" type="text"></div>
                <div style="margin-top: 25px;">
                    <button @click="addExample" class="btn-add-ex">➕ 新增一句</button>
                    <label style="font-size: 0.9em; font-weight: bold; color: #555;">例句管理</label>
                </div>
                <div style="margin-top: 10px;">
                    <div v-for="(ex, i) in editData.examples" :key="i" class="edit-ex-group">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span style="font-size: 0.85em; color: var(--primary); font-weight: bold;">句子 {{ i + 1 }}</span>
                            <button @click="removeExample(i)" style="background:none; border:none; color:#ff4757; cursor:pointer;">刪除</button>
                        </div>
                        <input v-model="editData.examples[i]" type="text" placeholder="英文例句" style="width:100%; margin-bottom:8px; padding:8px;">
                        <input v-model="editData.chinese_ex[i]" type="text" placeholder="中文翻譯" style="width:100%; padding:8px;">
                    </div>
                </div>
                <div class="modal-actions">
                    <button @click="closeEditModal" class="btn-cancel">取消</button>
                    <button @click="saveEdit" class="btn-save">💾 儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (typeof Vue === 'undefined') {
            document.getElementById('error-box').style.display = 'block';
            document.getElementById('error-box').innerHTML = `<h3>⚠️ 致命錯誤：找不到 Vue 引擎</h3>`;
        } else {
            document.getElementById('app').style.display = 'block';

            // 壓縮版資料庫 [單字, 中文, 英文例句1|英文例句2, 中文例句1|中文例句2]
            const COMPRESSED_DB = [
                ["office relocation", "辦公室搬遷", "The office relocation will be completed by next Monday.|We need to pack our desks before the office relocation.", "辦公室搬遷將在下週一前完成。|我們需要在辦公室搬遷前打包好桌面。"],
                ["reception desk", "接待台", "Please leave the room keys at the reception desk.|Our group of seven gathered at the reception desk.", "請將房間鑰匙留在接待台。|我們七個人在接待台集合。"],
                ["leading supplier", "主要供應商", "They are the leading supplier of sports equipment.|We signed a contract with the leading supplier.", "他們是運動設備的主要供應商。|我們與該主要供應商簽訂了合約。"],
                ["intended listener", "目標聽眾", "Make sure your speech reaches the intended listener.|The advertisement didn't attract its intended listener.", "確保你的演講能傳達給目標聽眾。|這則廣告並沒有吸引到它的目標聽眾。"],
                ["consultation", "諮詢", "I scheduled a quick consultation with the doctor.|The interior designer offers a free consultation.", "我安排了與醫生的快速諮詢。|這位室內設計師提供免費諮詢。"],
                ["upon", "一...就... / 在...之上", "Upon arrival at the airport, we will rent a car.|They agreed upon the budget for the trip.", "一抵達機場，我們就會去租車。|他們就這趟旅行的預算達成了共識。"],
                ["pottery", "陶器", "We bought some beautiful handmade pottery as souvenirs.|He is taking a pottery class on weekends.", "我們買了一些美麗的手工陶器當紀念品。|他週末在上有陶藝課。"],
                ["assess", "評估", "We need to assess the cost of the 10-day trip.|The coach will assess the players' fitness levels.", "我們需要評估這趟 10 天旅行的花費。|教練將評估球員們的體能狀況。"],
                ["vitality", "活力", "Working out weekly helps me maintain my vitality.|The fresh mountain air filled us with vitality.", "每週健身有助於我保持活力。|清新的高山空氣讓我們充滿了活力。"],
                ["command", "命令 / 指揮", "The dog immediately obeyed his command.|She has a good command of the English language.", "那隻狗立刻服從了他的命令。|她精通英語（對英語有很好的掌握）。"],
                ["fixtures", "固定裝置", "We are choosing new lighting fixtures for the living room.|The bathroom fixtures were recently updated.", "我們正在為客廳挑選新的照明燈具（固定裝置）。|浴室的固定設備最近剛更新過。"],
                ["naturally", "自然地 / 當然", "Try to speak naturally when ordering food.|Naturally, we will split the bill seven ways.", "點餐時盡量自然地說話。|當然，我們會把帳單分成七份。"],
                ["obligation", "義務 / 責任", "You have no obligation to buy anything in that store.|It is our obligation to clean up before leaving.", "你在那家店裡沒有義務購買任何東西。|離開前清理乾淨是我們的責任。"],
                ["I cannot recommend the store enough", "我極力推薦這家店", "The service was perfect; I cannot recommend the store enough.|If you want a great burger, I cannot recommend the store enough.", "服務太完美了；我極力推薦這家店。|如果你想吃超讚的漢堡，我極力推薦這家店。"],
                ["verge", "邊緣", "I was on the verge of canceling the trip.|The company is on the verge of a major breakthrough.", "我差點（處於邊緣）就要取消這趟旅行了。|這家公司正處於重大突破的邊緣。"],
                ["a couple of other places", "其他幾個地方", "We plan to visit a couple of other places in New York.|Let's check a couple of other places before deciding.", "我們打算去紐約的其他幾個地方看看。|在決定之前，我們再去其他幾個地方看看吧。"],
                ["lost cause", "注定失敗的事", "Trying to change his mind is a lost cause.|Don't waste energy on a lost cause.", "試圖改變他的想法是白費力氣（注定失敗）。|別把精力浪費在注定失敗的事情上。"],
                ["cause", "原因 / 引起", "What was the root cause of the delay?|The bad weather caused our flight to be canceled.", "延誤的根本原因是什麼？|惡劣的天氣導致我們的航班被取消。"],
                ["deal", "交易 / 處理", "We got a great deal on our hotel rooms.|Let me deal with this problem.", "我們的飯店房間拿到了很棒的折扣（交易）。|讓我來處理這個問題。"],
                ["disagreed", "不同意", "They strongly disagreed on where to eat tonight.|I disagreed with his proposed itinerary.", "他們對於今晚去哪吃飯意見非常不合。|我不同意他提議的行程。"],
                ["diagnose", "診斷", "The doctor was unable to diagnose his illness.|It is hard to diagnose the problem with the car.", "醫生無法診斷出他的病情。|很難診斷出這輛車的問題出在哪。"],
                ["swiftly", "迅速地", "The waitress moved swiftly to bring our drinks.|We need to act swiftly to catch the train.", "女服務生迅速地把我們的飲料送來。|我們需要迅速行動才趕得上火車。"],
                ["generally", "通常 / 大致上", "Americans generally leave a 15 to 20 percent tip.|I generally wake up at 7 AM.", "美國人通常會留 15% 到 20% 的小費。|我通常早上七點起床。"],
                ["enhancing", "增強 / 提升", "We are looking for ways of enhancing the customer experience.|Reading news is great for enhancing your English.", "我們正在尋找提升顧客體驗的方法。|閱讀新聞對增強你的英文很有幫助。"],
                ["acceptable", "可接受的", "Is this casual outfit acceptable for the restaurant?|The proposed budget is completely acceptable.", "這套休閒服裝去那家餐廳可以接受嗎？|提出來的預算完全可以接受。"],
                ["financial means", "財力 / 財務手段", "They lack the financial means to support the project.|Do we have the financial means for a longer trip?", "他們缺乏財力來支持這個專案。|我們有足夠的財力延長旅程嗎？"],
                ["afford", "負擔得起", "We can't afford to miss this flight.|If we split the cost, everyone can afford it.", "我們承擔不起錯過這班飛機的後果。|如果我們平攤費用，每個人都負擔得起。"],
                ["appropriate", "適當的", "Please wear appropriate clothing for the hike.|Is this an appropriate time to call?", "請穿著適當的服裝去健行。|現在打電話是適當的時機嗎？"],
                ["disability", "殘疾", "The museum is fully accessible for people with a disability.|He overcame his physical disability to win the race.", "這間博物館對殘疾人士來說完全無障礙。|他克服了身體的殘障贏得了比賽。"],
                ["senior", "年長的 / 資深的", "Senior citizens get a discount at this cinema.|He is a senior engineer at the tech company.", "年長者在這家電影院可享折扣。|他是那家科技公司的資深工程師。"],
                ["citizen", "公民", "Are you a U.S. citizen?|Every citizen has the right to vote.", "你是美國公民嗎？|每個公民都有投票權。"],
                ["mobility", "機動性 / 活動力", "Regular exercise helps maintain joint mobility.|The new smartphone offers greater mobility for work.", "規律運動有助於維持關節活動力。|新的智慧型手機為工作提供了更大的機動性。"],
                ["caution", "警告 / 謹慎", "Proceed with caution when driving in the snow.|The sign advised caution due to the wet floor.", "在雪地開車請謹慎前行。|告示牌警告因為地板濕滑要小心。"],
                ["consumer", "消費者", "The company aims to protect consumer rights.|Consumer demand for eco-friendly products is rising.", "公司致力於保護消費者權益。|消費者對環保產品的需求正在上升。"],
                ["element", "要素 / 元素", "Trust is a key element in any relationship.|We need to consider the element of surprise.", "信任是任何關係中的關鍵要素。|我們需要把驚喜這個元素考慮進去。"],
                ["placement", "放置 / 佈置", "The product placement in the movie was very obvious.|We discussed the placement of the new sofa.", "這部電影裡的產品置入（放置）非常明顯。|我們討論了新沙發的擺放位置。"],
                ["assurance", "保證", "He gave me his assurance that the car would be ready.|I need some assurance before I sign the contract.", "他向我保證車子會準備好。|在簽約之前我需要一些保證。"],
                ["knit belt", "針織腰帶", "She bought a colorful knit belt to match her dress.|A knit belt is comfortable for a long flight.", "她買了一條色彩繽紛的針織腰帶搭配洋裝。|搭長途飛機時繫針織腰帶很舒服。"],
                ["even so", "即使如此", "It's raining heavily; even so, we will go out.|The trip was exhausting. Even so, I had a great time.", "雨下得很大；即使如此，我們還是要出門。|這趟旅行很累人。即使如此，我還是玩得很開心。"],
                ["despite", "儘管", "We arrived on time despite the heavy traffic.|He smiled despite the pain.", "儘管交通擁擠，我們還是準時抵達了。|儘管很痛，他還是笑了。"],
                ["tablet", "平板電腦 / 藥片", "I downloaded some movies onto my tablet for the flight.|Take one tablet twice a day after meals.", "我下載了一些電影到平板電腦裡準備在飛機上看。|這個藥片每天兩次，飯後服用。"],

                ["portable", "可攜帶的", "I bought a portable charger for my phone.|He uses a portable heater in his office during winter.", "我為我的手機買了一個行動電源（可攜帶充電器）。|他冬天在辦公室用一台可攜帶式的暖氣機。"],
                ["outcome", "結果", "What was the final outcome of the negotiation?|We are very satisfied with the outcome of the project.", "談判的最終結果是什麼？|我們對這個專案的結果非常滿意。"],
                ["prior to", "在...之前", "Please arrive at the airport two hours prior to departure.|He worked as a teacher prior to joining our company.", "請在出發前兩小時抵達機場。|在加入我們公司之前，他是一名老師。"],
                ["diligently", "勤奮地", "He worked diligently to finish the project on time.|She has been studying English diligently for months.", "他勤奮地工作以準時完成專案。|幾個月來她一直勤奮地學習英文。"],
                ["affordable", "負擔得起的", "We found a very affordable Airbnb for our group of seven.|This brand offers stylish but affordable clothing.", "我們為我們七個人找到了一間非常平價（負擔得起）的 Airbnb。|這個品牌提供時尚但平價的服飾。"],
                ["steady", "穩定的", "The company has seen steady growth over the last five years.|You need a steady hand to paint those small details.", "這家公司在過去五年中看到了穩定的成長。|你需要一雙穩定的手來畫那些小細節。"],
                ["thoughtful", "體貼的", "It was very thoughtful of you to bring me coffee.|He gave me a thoughtful gift for my birthday.", "你帶咖啡給我真是太體貼了。|他送了我一份很用心的（體貼的）生日禮物。"],
                ["influence", "影響", "His speech had a great influence on my decision.|Do not drive under the influence of alcohol.", "他的演講對我的決定有很大的影響。|酒後請勿駕車（在酒精影響下）。"],
                ["tangible", "有形的 / 實體的", "We need tangible evidence, not just rumors.|The company offers tangible benefits to its employees.", "我們需要具體的（有形的）證據，而不只是謠言。|這家公司為員工提供實質的福利。"],
                ["narrow", "狹窄的", "The mountain road was very narrow and dangerous.|He won the election by a narrow margin.", "這條山路非常狹窄且危險。|他以微弱的（狹窄的）差距贏得了選舉。"],
                ["situation", "情況 / 處境", "We are dealing with a very difficult situation right now.|I don't know how I would react in that situation.", "我們現在正在處理一個非常困難的情況。|我不知道在那種情況下我會作何反應。"],

                ["massive", "巨大的", "The explosion caused massive damage to the building.|He has a massive collection of comic books.", "爆炸對建築物造成了巨大的損害。|他收藏了大量的（巨大的）漫畫書。"],

                ["sufficient", "足夠的", "We have sufficient food for the entire trip.|Her explanation was not sufficient to convince me.", "我們有足夠的食物應付整趟旅行。|她的解釋不足以說服我。"],
                ["affect", "影響", "Lack of sleep can strongly affect your mood.|Will the rain affect our outdoor plans?", "睡眠不足會強烈影響你的心情。|下雨會影響我們的戶外計畫嗎？"],
                ["inspire", "激勵", "His story of overcoming difficulties inspired everyone.|The beautiful scenery inspired her to write a poem.", "他克服困難的故事激勵了所有人。|美麗的風景激發了她寫詩的靈感。"],
                ["transformative", "徹底改觀的", "Traveling alone can be a transformative experience.|The new technology had a transformative impact on the industry.", "獨自旅行可能是一次改變人生的（徹底改觀的）體驗。|新科技對該產業產生了革命性的影響。"],
                ["exact", "精確的 / 確切的", "What is the exact time of your arrival?|These are his exact words.", "你確切的抵達時間是什麼時候？|這些是他原原本本的話（精確的用詞）。"],
                ["debate", "辯論", "They had a long debate about politics.|The topic is currently under debate in the parliament.", "他們針對政治進行了長時間的辯論。|這個話題目前正在議會中辯論。"],
                ["overcome", "克服", "She had to overcome many obstacles to reach her goal.|He finally overcame his fear of flying.", "她必須克服許多障礙才能達到目標。|他終於克服了對飛行的恐懼。"],
                ["adapt", "適應", "When you travel, you have to adapt to new cultures.|It is hard to adapt to the cold weather here.", "旅行時，你必須適應新的文化。|很難適應這裡寒冷的天氣。"],
                ["vital", "極其重要的", "Water is vital for all living things.|It is vital that you read this document before signing.", "水對所有生物都是極其重要的。|在簽字前閱讀這份文件是至關重要的。"],
                ["severe", "嚴重的", "The severe storm canceled all flights.|He suffers from severe back pain.", "嚴重的風暴導致所有航班取消。|他患有嚴重的背痛。"],
                ["exceed", "超過", "Your luggage must not exceed 23 kilograms.|The final cost exceeded our initial budget.", "你的行李不得超過 23 公斤。|最終花費超過了我們最初的預算。"],
                ["convince", "說服", "I tried to convince him to join our gym.|She convinced me that it was a good idea.", "我試圖說服他加入我們的健身房。|她說服我這是一個好主意。"],
                ["declare", "宣布", "The government declared a state of emergency.|Do you have anything to declare at customs?", "政府宣布進入緊急狀態。|在海關你有什麼東西需要申報（宣布）嗎？"],
                ["unlike", "不像 / 不同的", "Unlike his brother, he is very outgoing.|This new model is quite unlike the previous one.", "不像他的兄弟，他非常外向。|這款新機型與之前的非常不同。"],
                ["endure", "忍受", "I cannot endure this loud noise anymore.|The marathon runners had to endure extreme heat.", "我無法再忍受這種巨大的噪音了。|馬拉松跑者必須忍受極度的高溫。"],
                ["expect", "期待 / 預計", "What time do you expect to arrive?|I didn't expect the movie to be this good.", "你預計幾點抵達？|我沒料到這部電影這麼好看。"],
                ["reward", "報酬 / 獎賞", "He received a financial reward for his hard work.|The dog gets a treat as a reward for good behavior.", "他因為辛勤工作獲得了金錢報酬。|這隻狗因為表現好而得到了零食作為獎勵。"],
                ["valuable", "有價值的", "This old watch is very valuable to me.|He learned a valuable lesson from his mistake.", "這隻舊手錶對我來說非常有價值。|他從錯誤中學到了寶貴的一課。"],
                ["attitude", "態度", "She has a very positive attitude toward life.|You need to change your bad attitude.", "她對生活有非常積極的態度。|你需要改變你惡劣的態度。"],
                ["urge", "催促 / 強烈欲望", "The teacher urged the students to study harder.|I felt a sudden urge to eat chocolate.", "老師催促學生們更用功讀書。|我突然有一股強烈想吃巧克力的衝動。"],
                ["passionate", "熱情的", "He is very passionate about playing baseball.|She gave a passionate speech at the wedding.", "他對打棒球非常充滿熱情。|她在婚禮上發表了熱情的演說。"],
                ["regret", "後悔", "I regret not learning English when I was younger.|We regret to inform you that the flight is canceled.", "我後悔年輕時沒有學好英文。|我們很遺憾（後悔）地通知您航班取消了。"],
                ["exclusive", "獨有的 / 獨家的", "This VIP lounge is for exclusive use of our club members.|The reporter got an exclusive interview with the star.", "這個 VIP 休息室是我們俱樂部會員獨家使用的。|這位記者獲得了該明星的獨家專訪。"],
                ["conscious", "有意識的", "I am conscious of the risks involved in this project.|He was severely injured but remained conscious.", "我意識到了這個專案所涉及的風險。|他受了重傷但仍保持清醒（有意識的）。"],
                ["absorb", "吸收", "Sponges absorb a lot of water.|It's hard to absorb so much information in one day.", "海綿能吸收很多水。|很難在一天內吸收這麼多資訊。"],
                ["admit", "承認", "I have to admit that I was wrong.|The ticket admits two people to the museum.", "我必須承認我錯了。|這張票允許（承認）兩人進入博物館。"],
                ["express", "表達 / 快速的", "I would like to express my gratitude for your help.|We took the express train to the airport.", "我想對你的幫助表達我的感激之情。|我們搭乘了直達（快速的）列車前往機場。"],
                ["determine", "決定", "Your budget will determine which hotel we can book.|The police are trying to determine the cause of the accident.", "你的預算將決定我們可以訂哪間飯店。|警方正試圖確定（決定）事故的原因。"],
                ["essential", "必要的 / 不可或缺的", "A good passport is essential for international travel.|Water is essential for human life.", "一本好的護照是國際旅行所必需的。|水對人類生命是不可或缺的。"],
                ["interactive", "互動的", "The museum has many interactive exhibits for children.|We enjoyed the interactive workshop.", "這間博物館有許多適合兒童的互動展覽。|我們很享受那個互動式的工作坊。"],
                ["permanent", "永久的", "She is looking for a permanent job, not a temporary one.|I got a permanent marker to label the boxes.", "她在找一份永久的工作，而不是暫時的。|我拿了一支奇異筆（永久性麥克筆）來標記箱子。"]
            ];

            const PERMANENT_WORDS = COMPRESSED_DB.map(item => ({
                word: item[0],
                phonetic: "", // 如果想要音標，可以點擊編輯自己加
                chinese: item[1],
                examples: item[2] ? item[2].split('|') : [],
                chinese_ex: item[3] ? item[3].split('|') : []
            }));

            // 為了避免一次塞太多佔據版面，我先為你精選了這近 100 個最常考、最實用的單字放入永久字庫！
            // 如果你還有其他字想加，現在你可以使用介面上的「一鍵獲取」功能直接從網路抓取，
            // 或是用「編輯」按鈕手動輸入！

            const app = Vue.createApp({
                data() {
                    return {
                        currentTab: 'bank',
                        searchQuery: '',
                        loading: false,
                        wordBank: [],
                        quizWords: [],
                        currentQuizIndex: 0,
                        isFlipped: false,
                        showEditModal: false,
                        editingIndex: -1,
                        editData: { word: '', phonetic: '', chinese: '', examples: [], chinese_ex: [] }
                    }
                },
                computed: {
                    currentCard() {
                        return this.quizWords[this.currentQuizIndex] || { examples: [], chinese_ex: [] };
                    }
                },
                mounted() {
                    let localData = JSON.parse(localStorage.getItem('myFlashcards_v8') || 'null');
                    if (!localData || localData.length === 0) {
                        this.wordBank = JSON.parse(JSON.stringify(PERMANENT_WORDS));
                        localStorage.setItem('myFlashcards_v8', JSON.stringify(this.wordBank));
                    } else {
                        this.wordBank = localData;
                    }
                },
                methods: {
                    async translate(text) {
                        try {
                            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURI(text)}`);
                            const data = await res.json();
                            return data[0][0][0];
                        } catch (e) { return "翻譯失敗"; }
                    },
                    async searchAndAddWord() {
                        const wordToSearch = this.searchQuery.trim().toLowerCase();
                        if (!wordToSearch) return;
                        if (this.wordBank.some(w => w.word.toLowerCase() === wordToSearch)) {
                            alert("這個單字已經在你的單字庫囉！");
                            this.searchQuery = '';
                            return;
                        }
                        this.loading = true;
                        try {
                            const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${wordToSearch}`);
                            if (!dictRes.ok) throw new Error("找不到單字");
                            const dictData = await dictRes.json();
                            const entry = dictData[0];
                            let rawExs = [];
                            entry.meanings.forEach(m => { m.definitions.forEach(d => { if (d.example) rawExs.push(d.example); }); });
                            if (rawExs.length === 0) {
                                entry.meanings.forEach(m => { m.definitions.forEach(d => { if (d.definition) rawExs.push(d.definition); }); });
                            }
                            const [zhWord, ...zhExs] = await Promise.all([ this.translate(entry.word), ...rawExs.map(ex => this.translate(ex)) ]);
                            const newWord = {
                                word: entry.word, phonetic: entry.phonetic || (entry.phonetics && entry.phonetics[0] ? entry.phonetics[0].text : ''),
                                chinese: zhWord, examples: rawExs, chinese_ex: zhExs
                            };
                            this.wordBank.unshift(newWord);
                            localStorage.setItem('myFlashcards_v8', JSON.stringify(this.wordBank));
                            this.searchQuery = '';
                        } catch (e) {
                            alert("❌ 查無此字！請善用『編輯』功能手動新增喔！");
                        }
                        this.loading = false;
                    },
                    removeFromBank(index) {
                        if(confirm("確定要刪除這個單字嗎？")) {
                            this.wordBank.splice(index, 1);
                            localStorage.setItem('myFlashcards_v8', JSON.stringify(this.wordBank));
                        }
                    },
                    openEditModal(index) {
                        this.editingIndex = index;
                        this.editData = JSON.parse(JSON.stringify(this.wordBank[index]));
                        this.showEditModal = true;
                    },
                    closeEditModal() {
                        this.showEditModal = false;
                        this.editingIndex = -1;
                    },
                    saveEdit() {
                        if (!this.editData.word.trim()) { alert("英文單字不能為空白！"); return; }
                        this.wordBank[this.editingIndex] = JSON.parse(JSON.stringify(this.editData));
                        localStorage.setItem('myFlashcards_v8', JSON.stringify(this.wordBank));
                        this.closeEditModal();
                    },
                    addExample() {
                        if (!this.editData.examples) this.editData.examples = [];
                        if (!this.editData.chinese_ex) this.editData.chinese_ex = [];
                        this.editData.examples.push('');
                        this.editData.chinese_ex.push('');
                    },
                    removeExample(index) {
                        this.editData.examples.splice(index, 1);
                        this.editData.chinese_ex.splice(index, 1);
                    },
                    speak(text) {
                        window.speechSynthesis.cancel();
                        const msg = new SpeechSynthesisUtterance(text);
                        msg.lang = 'en-US';
                        msg.rate = 0.9; 
                        window.speechSynthesis.speak(msg);
                    },
                    startQuiz() {
                        if (this.wordBank.length === 0) {
                            this.currentTab = 'quiz';
                            this.quizWords = [];
                            return;
                        }
                        let selectedWords = [...this.wordBank].sort(() => 0.5 - Math.random()).slice(0, 10);
                        this.quizWords = JSON.parse(JSON.stringify(selectedWords)).map(card => {
                            let pairs = [];
                            if (card.examples && card.chinese_ex) {
                                for(let i=0; i<card.examples.length; i++) { pairs.push({ en: card.examples[i], zh: card.chinese_ex[i] }); }
                            }
                            if (pairs.length > 2) { pairs = pairs.sort(() => 0.5 - Math.random()).slice(0, 2); }
                            card.examples = pairs.map(p => p.en);
                            card.chinese_ex = pairs.map(p => p.zh);
                            return card;
                        });
                        this.currentQuizIndex = 0;
                        this.isFlipped = false;
                        this.currentTab = 'quiz';
                    },
                    flipCard() { this.isFlipped = !this.isFlipped; },
                    nextCard() {
                        if (this.currentQuizIndex < this.quizWords.length - 1) {
                            this.isFlipped = false;
                            setTimeout(() => { this.currentQuizIndex++; }, 150);
                        }
                    },
                    prevCard() {
                        if (this.currentQuizIndex > 0) {
                            this.isFlipped = false;
                            setTimeout(() => { this.currentQuizIndex--; }, 150);
                        }
                    },
                    finishQuiz() {
                        alert("🎉 恭喜你完成這次的翻卡測驗！");
                        this.currentTab = 'bank';
                    }
                }
            });

            app.mount('#app');
        }
    </script>
</body>
</html>
